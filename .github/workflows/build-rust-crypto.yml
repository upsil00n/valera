name: Build Rust Crypto Library

on:
  push:
    branches: [ main, master ]
    paths:
      - 'rust-crypto/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          symlinks: false  # ← Добавь эту строку!

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Add Android targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add x86_64-linux-android

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          add-to-path: true

      - name: Build for Android
        working-directory: rust-crypto
        run: |
          export TOOLCHAIN=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64
          
          # aarch64 (arm64-v8a)
          export CC_aarch64_linux_android=$TOOLCHAIN/bin/aarch64-linux-android21-clang
          export AR_aarch64_linux_android=$TOOLCHAIN/bin/llvm-ar
          cargo build --target aarch64-linux-android --release
          
          # armv7 (armeabi-v7a)
          export CC_armv7_linux_androideabi=$TOOLCHAIN/bin/armv7a-linux-androideabi21-clang
          export AR_armv7_linux_androideabi=$TOOLCHAIN/bin/llvm-ar
          cargo build --target armv7-linux-androideabi --release
          
          # x86_64
          export CC_x86_64_linux_android=$TOOLCHAIN/bin/x86_64-linux-android21-clang
          export AR_x86_64_linux_android=$TOOLCHAIN/bin/llvm-ar
          cargo build --target x86_64-linux-android --release

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts/arm64-v8a
          mkdir -p artifacts/armeabi-v7a
          mkdir -p artifacts/x86_64
          
          cp rust-crypto/target/aarch64-linux-android/release/libvalera_crypto.so artifacts/arm64-v8a/
          cp rust-crypto/target/armv7-linux-androideabi/release/libvalera_crypto.so artifacts/armeabi-v7a/
          cp rust-crypto/target/x86_64-linux-android/release/libvalera_crypto.so artifacts/x86_64/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: valera-crypto-libs
          path: artifacts/
          retention-days: 30